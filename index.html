<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>OH-YUM BLASTER</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OH-YUM" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a1220" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a1220;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-family: 'Rajdhani', 'Arial', sans-serif;
      color: #ffffff;
    }
    body {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #game-container {
      position: relative;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 15;
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
    <div id="crosshair">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="15" fill="none" stroke="rgba(0,255,255,0.4)" stroke-width="1"/>
        <line x1="20" y1="5" x2="20" y2="14" stroke="rgba(0,255,255,0.5)" stroke-width="1"/>
        <line x1="20" y1="26" x2="20" y2="35" stroke="rgba(0,255,255,0.5)" stroke-width="1"/>
        <line x1="5" y1="20" x2="14" y2="20" stroke="rgba(0,255,255,0.5)" stroke-width="1"/>
        <line x1="26" y1="20" x2="35" y2="20" stroke="rgba(0,255,255,0.5)" stroke-width="1"/>
        <circle cx="20" cy="20" r="2" fill="rgba(0,255,255,0.6)"/>
      </svg>
    </div>
  </div>

  <!-- Landscape orientation prompt for phones -->
  <div id="rotate-prompt" style="
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a1220; color: #ffffff; z-index: 99999;
    justify-content: center; align-items: center; flex-direction: column;
    font-family: Rajdhani, Arial, sans-serif; text-align: center;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">📱↔️</div>
    <div style="font-size: 20px; font-weight: bold;">Rotate your device</div>
    <div style="font-size: 14px; margin-top: 8px; color: #ccc;">OH-YUM BLASTER plays best in landscape</div>
  </div>
  <script>
    function checkOrientation() {
      var p = document.getElementById('rotate-prompt');
      if (window.innerHeight > window.innerWidth && window.innerWidth < 600) {
        p.style.display = 'flex';
      } else {
        p.style.display = 'none';
      }
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
      setTimeout(checkOrientation, 100);
    });
    checkOrientation();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

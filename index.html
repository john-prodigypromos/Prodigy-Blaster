<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>OH-YUM BLASTER</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OH-YUM" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a1220" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a1220;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    body {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Landscape orientation prompt for phones -->
  <div id="rotate-prompt" style="
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a1220; color: #ffffff; z-index: 99999;
    justify-content: center; align-items: center; flex-direction: column;
    font-family: Arial, sans-serif; text-align: center;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">📱↔️</div>
    <div style="font-size: 20px; font-weight: bold;">Rotate your device</div>
    <div style="font-size: 14px; margin-top: 8px; color: #ccc;">OH-YUM BLASTER plays best in landscape</div>
  </div>
  <script>
    function checkOrientation() {
      var p = document.getElementById('rotate-prompt');
      // Only show on phones in portrait (not tablets)
      if (window.innerHeight > window.innerWidth && window.innerWidth < 600) {
        p.style.display = 'flex';
      } else {
        p.style.display = 'none';
      }
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', function() {
      setTimeout(checkOrientation, 100);
    });
    checkOrientation();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
